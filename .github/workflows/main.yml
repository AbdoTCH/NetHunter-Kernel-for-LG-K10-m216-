name: Build NetHunter Kernel for LG K10 (m216)

on:
  push:
  workflow_dispatch:
    inputs:
      defconfig:
        description: 'Kernel defconfig'
        required: true
        type: choice
        options:
          - m216_defconfig
          - m216_global_com_defconfig
          - m216_global_com-perf_defconfig
          - msm8916_defconfig
          - msm8916-512mb_defconfig
          - msm8916-512mb-perf_defconfig
          - msm8916-perf_defconfig
          - nethunter_defconfig
        default: m216_global_com_defconfig
      toolchain:
        description: 'GCC toolchain'
        required: true
        type: choice
        options:
          - Linaro GCC 4.9 (ARM)
          - Linaro GCC 5.5 (ARM)
          - Linaro GCC 7.5 (ARM)
        default: Linaro GCC 4.9 (ARM)

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential bc flex bison curl ccache git wget xz-utils patch libncurses-dev pkg-config

      - name: Clone kernel source
        run: |
          git clone --depth=1 https://github.com/LineageOS/android_kernel_lge_msm8916.git -b cm-14.1 kernel

      - name: Clone NetHunter builder (for patches)
        run: |
          cd kernel
          git clone --depth=1 https://gitlab.com/kalilinux/nethunter/build-scripts/kali-nethunter-kernel-builder.git

      - name: Download GCC toolchain
        run: |
          mkdir -p ~/nethunter_tools
          cd ~/nethunter_tools
          
          case "${{ github.event.inputs.toolchain || 'Linaro GCC 4.9 (ARM)' }}" in
            "Linaro GCC 5.5 (ARM)")
              wget -q https://releases.linaro.org/components/toolchain/binaries/5.5-2017.10/arm-linux-gnueabihf/gcc-linaro-5.5.0-2017.10-x86_64_arm-linux-gnueabihf.tar.xz
              tar xf gcc-linaro-5.5.0-2017.10-x86_64_arm-linux-gnueabihf.tar.xz
              mv gcc-linaro-5.5.0-2017.10-x86_64_arm-linux-gnueabihf arm-linux-androideabi-4.9
              rm gcc-linaro-5.5.0-2017.10-x86_64_arm-linux-gnueabihf.tar.xz
              ;;
            "Linaro GCC 7.5 (ARM)")
              wget -q https://releases.linaro.org/components/toolchain/binaries/7.5-2019.12/arm-linux-gnueabihf/gcc-linaro-7.5.0-2019.12-x86_64_arm-linux-gnueabihf.tar.xz
              tar xf gcc-linaro-7.5.0-2019.12-x86_64_arm-linux-gnueabihf.tar.xz
              mv gcc-linaro-7.5.0-2019.12-x86_64_arm-linux-gnueabihf arm-linux-androideabi-4.9
              rm gcc-linaro-7.5.0-2019.12-x86_64_arm-linux-gnueabihf.tar.xz
              ;;
            *)
              wget -q https://releases.linaro.org/components/toolchain/binaries/4.9-2017.01/arm-linux-gnueabihf/gcc-linaro-4.9.4-2017.01-x86_64_arm-linux-gnueabihf.tar.xz
              tar xf gcc-linaro-4.9.4-2017.01-x86_64_arm-linux-gnueabihf.tar.xz
              mv gcc-linaro-4.9.4-2017.01-x86_64_arm-linux-gnueabihf arm-linux-androideabi-4.9
              rm gcc-linaro-4.9.4-2017.01-x86_64_arm-linux-gnueabihf.tar.xz
              ;;
          esac
          
          cd arm-linux-androideabi-4.9/bin
          for f in arm-linux-gnueabihf-*; do
            newname=$(echo "$f" | sed 's/arm-linux-gnueabihf/arm-linux-androideabi/')
            ln -s "$f" "$newname" 2>/dev/null
          done

      - name: Fix kernel source
        working-directory: kernel
        run: |
          # Fix yylloc duplicate
          sed -i 's/YYLTYPE yylloc;/extern YYLTYPE yylloc;/' scripts/dtc/dtc-lexer.lex.c_shipped
          rm -f scripts/dtc/dtc-lexer.lex.c

          # Fix Python 2 print statements (Python 3 compatibility)
          sed -i 's/print "error, forbidden warning:", m.group(2)/print("error, forbidden warning:", m.group(2))/' scripts/gcc-wrapper.py
          sed -i 's/print line,/print(line, end="")/' scripts/gcc-wrapper.py
          sed -i "s/print ' '.join(args), str(e)/print(' '.join(args), str(e))/" scripts/gcc-wrapper.py
          sed -i "s/print 'Is your PATH set correctly?'/print('Is your PATH set correctly?')/" scripts/gcc-wrapper.py

          # Fix kernelrelease version error
          sed -i 's|echo "Error: kernelrelease not valid.*|echo "3.10.49-NetHunter"|' scripts/setlocalversion
          sed -i 's|exit 1|exit 0|' scripts/setlocalversion

          # Fix Makefile to bypass broken gcc-wrapper
          sed -i 's|CC.*scripts/gcc-wrapper.py.*|CC = $(REAL_CC)|' Makefile
          sed -i 's|REAL_CC.*=.*|REAL_CC = $(CROSS_COMPILE)gcc|' Makefile

          # Fix ncurses detection (bypass check entirely)
          cat > scripts/kconfig/lxdialog/check-lxdialog.sh << 'INNER'
      #!/bin/sh
      case "$1" in
          "-check") exit 0 ;;
          "-ccflags") echo '-DCURSES_LOC="<ncurses.h>" -I/usr/include/ncursesw' ;;
          "-ldflags") echo '-lncursesw -ltinfo' ;;
      esac
      INNER
          chmod +x scripts/kconfig/lxdialog/check-lxdialog.sh

      - name: Apply NetHunter patches
        working-directory: kernel
        run: |
          PATCHES=kali-nethunter-kernel-builder/patches/3.10

          # HID MSM8916 patch
          if [ -f "$PATCHES/add-HID-km-support-motorola__msm8916_____3.10.patch" ]; then
            echo "Applying HID MSM8916 patch..."
            patch -p1 < "$PATCHES/add-HID-km-support-motorola__msm8916_____3.10.patch" || true
            if [ -f drivers/usb/gadget/android.c.rej ]; then
              echo "Fixing android.c HID function manually..."
              sed -i '3249a\\nstatic int hid_function_init(struct android_usb_function *f, struct usb_composite_dev *cdev)\n{\n\treturn ghid_setup(cdev->gadget, 2);\n}\n\nstatic void hid_function_cleanup(struct android_usb_function *f)\n{\n\tghid_cleanup();\n}\n\nstatic int hid_function_bind_config(struct android_usb_function *f, struct usb_configuration *c)\n{\n\tint ret;\n\tprintk(KERN_INFO "hid keyboard\\n");\n\tret = hidg_bind_config(c, &ghid_device_android_keyboard, 0);\n\tif (ret) {\n\t\tpr_info("%s: hid_function_bind_config keyboard failed: %d\\n", __func__, ret);\n\t\treturn ret;\n\t}\n\tprintk(KERN_INFO "hid mouse\\n");\n\tret = hidg_bind_config(c, &ghid_device_android_mouse, 1);\n\tif (ret) {\n\t\tpr_info("%s: hid_function_bind_config mouse failed: %d\\n", __func__, ret);\n\t\treturn ret;\n\t}\n\treturn 0;\n}\n\nstatic struct android_usb_function hid_function = {\n\t.name\t\t= "hid",\n\t.init\t\t= hid_function_init,\n\t.cleanup\t= hid_function_cleanup,\n\t.bind_config\t= hid_function_bind_config,\n};' drivers/usb/gadget/android.c
              sed -i 's/\t\&midi_function,/\t\&hid_function,\n\t\&midi_function,/' drivers/usb/gadget/android.c
              rm -f drivers/usb/gadget/android.c.rej
              echo "HID function added to android.c"
            fi
          fi

          # mac80211 packet injection patch
          if [ -f "$PATCHES/add-mac80211-packet-injection-3.10.patch" ]; then
            echo "Applying mac80211 injection patch..."
            patch -p1 < "$PATCHES/add-mac80211-packet-injection-3.10.patch" || true
          fi

          # rtl8xxxu WiFi driver patch
          if [ -f "$PATCHES/add-rtl8xxxu-with-rtl8188eus-drivers-3.10.patch" ]; then
            echo "Applying rtl8xxxu driver patch..."
            patch -p1 < "$PATCHES/add-rtl8xxxu-with-rtl8188eus-drivers-3.10.patch" || true
            grep -q "rtl8xxxu" drivers/net/wireless/Kconfig || echo 'source "drivers/net/wireless/rtl8xxxu/Kconfig"' >> drivers/net/wireless/Kconfig
            grep -q "rtl8xxxu" drivers/net/wireless/Makefile || echo 'obj-$(CONFIG_RTL8XXXU) += rtl8xxxu/' >> drivers/net/wireless/Makefile
            echo "rtl8xxxu Kconfig/Makefile fixed"
          fi

      - name: Build kernel
        working-directory: kernel
        run: |
          export ARCH=arm
          export CROSS_COMPILE=~/nethunter_tools/arm-linux-androideabi-4.9/bin/arm-linux-androideabi-
          
          DEFCONFIG="${{ github.event.inputs.defconfig || 'm216_global_com_defconfig' }}"
          echo "============================================"
          echo " Building with defconfig: $DEFCONFIG"
          echo " Toolchain: ${{ github.event.inputs.toolchain || 'Linaro GCC 4.9' }}"
          echo "============================================"
          
          make $DEFCONFIG
          make -j$(nproc)

      - name: Create flashable zip
        run: |
          DEFCONFIG="${{ github.event.inputs.defconfig || 'm216_global_com' }}"
          DEFCONFIG=$(echo "$DEFCONFIG" | sed 's/_defconfig//')
          
          cd kernel/kali-nethunter-kernel-builder
          mkdir -p out/arch/arm/boot/ output
          cp ../../arch/arm/boot/zImage out/arch/arm/boot/
          
          cd anykernel3
          cp ../../../arch/arm/boot/zImage .
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i "s/kernel.string=.*/kernel.string=NetHunter Kernel for LG K10 (${DEFCONFIG})/" anykernel.sh
          zip -r ../output/nethunter-kernel-${DEFCONFIG}.zip ./*
          
          echo "Zip created: nethunter-kernel-${DEFCONFIG}.zip"

      - name: Upload kernel zip
        uses: actions/upload-artifact@v4
        with:
          name: NetHunter-kernel-${{ github.event.inputs.defconfig || 'm216_global_com' }}
          path: kernel/kali-nethunter-kernel-builder/output/*.zip

      - name: Upload zImage
        uses: actions/upload-artifact@v4
        with:
          name: zImage-${{ github.event.inputs.defconfig || 'm216_global_com' }}
          path: kernel/arch/arm/boot/zImage

      - name: Build summary
        run: |
          echo "============================================"
          echo " ✅ BUILD COMPLETE"
          echo "============================================"
          echo " Device:     LG K10 (m216)"
          echo " Chipset:    MSM8916 Snapdragon 410"
          echo " Kernel:     3.10.49-NetHunter"
          echo " Defconfig:  ${{ github.event.inputs.defconfig || 'm216_global_com_defconfig' }}"
          echo " Toolchain:  ${{ github.event.inputs.toolchain || 'Linaro GCC 4.9' }}"
          echo "============================================"
          echo " Features:"
          echo "   - HID Keyboard/Mouse (BadUSB)"
          echo "   - mac80211 Packet Injection"
          echo "   - RTL8188EUS WiFi Adapter Support"
          echo "============================================"
